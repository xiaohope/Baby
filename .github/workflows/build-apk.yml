name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ 拉取代码
        uses: actions/checkout@v4

      - name: 🎯 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 安装依赖
        run: flutter pub get

      - name: 🧹 代码检查
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: 🔨 构建 APK (Release)
        run: flutter build apk --release

      - name: 📤 上传 APK 工件
        uses: actions/upload-artifact@v4
        with:
          name: baby-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: 📋 列出构建产物
        run: ls -lh build/app/outputs/flutter-apk/

      - name: 🚀 上传 APK 到服务器
        if: github.ref == 'refs/heads/master'
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null
          scp -r build/app/outputs/flutter-apk/app-release.apk $USER@$HOST:/www/wwwroot/baby-api/server/downloads/baby.apk
          ssh $USER@$HOST "sed -i 's/\"4.1.0\"/\"4.1.${{ github.run_number }}\"/' /www/wwwroot/baby-api/server/src/index.js"
          ssh $USER@$HOST "pm2 restart baby-api"
