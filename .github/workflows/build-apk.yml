name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ 拉取代码
        uses: actions/checkout@v4

      - name: 🎯 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 安装依赖
        run: flutter pub get

      - name: 🧹 代码检查
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: 🔨 构建 APK (Release)
        run: flutter build apk --release

      - name: 📤 上传 APK 工件
        uses: actions/upload-artifact@v4
        with:
          name: baby-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: 📋 列出构建产物
        run: ls -lh build/app/outputs/flutter-apk/
